name: Verify TicketChain

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --prefix frontend ci
      - run: npm test
      - run: npm run compile
      - run: npm run frontend:build
